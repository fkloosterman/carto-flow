{% extends "base.html" %}

{% block content %}
{% if page.nb_url %}
  <a href="{{ page.nb_url }}" title="Download Notebook" class="md-content__button md-icon">
    {% include ".icons/material/download.svg" %}
  </a>
{% endif %}
{{ super() }}
{% endblock content %}

{% block libs %}
{{ super() }}
<script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
<script>
  mermaid.initialize({
    startOnLoad: true,
    theme: 'default',
    securityLevel: 'loose'
  });
</script>
{% endblock %}
